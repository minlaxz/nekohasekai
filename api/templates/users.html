<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Usage</title>
</head>
<body>

<h2>User Usage</h2>

<table border="1">
    <thead>
        <tr>
            <th>Username</th>
            <th>Download</th>
            <th>Upload</th>
            <th>TCP Sessions</th>
            <th>UDP Sessions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.downlinkBytes }}</td>
            <td>{{ user.uplinkBytes }}</td>
            <td>{{ user.tcpSessions }}</td>
            <td>{{ user.udpSessions }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
